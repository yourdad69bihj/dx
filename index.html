<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Golf Session</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --purple: #7a00ff; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; transition: 0.3s; }
        .hidden { display: none !important; }

        /* Setup UI */
        .box { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 12px; margin: 10px; }
        .label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--neon); padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-purple { background: var(--purple); color: white; }

        /* HUD */
        .hud { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 1000; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon); }
        #map { flex-grow: 1; z-index: 1; }

        .score-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }
        .hole-nav { position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 1000; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="scr-course" class="screen">
    <div style="padding:40px 20px;">
        <h2 style="color:var(--neon)">NEARBY COURSES</h2>
        <div id="course-list">
            <div class="box" onclick="selectCourse('Wildwood Golf Club')">⛳ Wildwood Golf Club</div>
            <div class="box" onclick="selectCourse('Rolling Hills Estates')">⛳ Rolling Hills Estates</div>
            <div class="box" onclick="selectCourse('Custom Course')">⛳ Custom / Current Location</div>
        </div>
    </div>
</div>

<div id="scr-players" class="screen hidden">
    <div style="padding:40px 20px;">
        <h2 style="color:var(--purple)">START NEW SESSION</h2>
        <div class="box">
            <span class="label">Number of Players</span>
            <input type="number" id="player-count" value="1" min="1" max="4" onchange="genPlayerInputs()">
            <div id="player-names-box"></div>
            <button class="btn btn-purple" onclick="startSession()">START ROUND</button>
        </div>
    </div>
</div>

<div id="scr-game" class="screen hidden">
    <div class="hud">
        <div><span style="color:var(--neon); font-weight:900;">HOLE <span id="cur-hole-num">1</span></span></div>
        <div><span id="live-dist">0</span> YDS</div>
        <div onclick="toggleScoreView()" style="color:var(--purple); font-weight:bold;">SCORECARD ☰</div>
    </div>
    
    <div id="map"></div>

    <div class="hole-nav">
        <button class="btn" style="width:40px" onclick="changeHole(-1)">◀</button>
        <button class="btn" id="next-hole-btn" onclick="openHoleScore()">LOG SCORE & NEXT</button>
        <button class="btn" style="width:40px" onclick="changeHole(1)">▶</button>
    </div>
</div>

<div id="mod-score" class="screen hidden" style="background:rgba(0,0,0,0.9); z-index: 2000;">
    <div style="padding:40px 20px;">
        <h2 id="log-title">LOG SCORE: HOLE 1</h2>
        <div id="player-score-inputs"></div>
        <button class="btn" onclick="saveHoleAndNext()">NEXT HOLE ➜</button>
    </div>
</div>

<script>
    let players = [];
    let currentHole = 1;
    let map, userPos, userMarker, pinMarker, polyline;
    let gameData = {};

    // SETUP FUNCTIONS
    function selectCourse(c) {
        document.getElementById('scr-course').classList.add('hidden');
        document.getElementById('scr-players').classList.remove('hidden');
        genPlayerInputs();
    }

    function genPlayerInputs() {
        const count = document.getElementById('player-count').value;
        const container = document.getElementById('player-names-box');
        container.innerHTML = "";
        for(let i=0; i<count; i++) {
            container.innerHTML += `<input type="text" placeholder="Player ${i+1} Name" class="p-name-in" value="Player ${i+1}">`;
        }
    }

    function startSession() {
        const nameInputs = document.querySelectorAll('.p-name-in');
        players = Array.from(nameInputs).map(i => ({ name: i.value, scores: {} }));
        document.getElementById('scr-players').classList.add('hidden');
        document.getElementById('scr-game').classList.remove('hidden');
        initMap();
    }

    // GAMEPLAY FUNCTIONS
    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 8, fillOpacity: 1 }).addTo(map);
                map.setView(userPos, 18);
            } else { userMarker.setLatLng(userPos); }
            updateYardage();
        }, null, { enableHighAccuracy: true });

        map.on('click', e => {
            if (pinMarker) map.removeLayer(pinMarker);
            pinMarker = L.marker(e.latlng, {
                icon: L.divIcon({ className:'pin', html:'<div style="background:red;width:12px;height:12px;border-radius:50%;border:2px solid white;"></div>' })
            }).addTo(map);
            updateYardage();
        });
    }

    function updateYardage() {
        if (!userPos || !pinMarker) return;
        const d = Math.round(map.distance(userPos, pinMarker.getLatLng()) * 1.09361);
        document.getElementById('live-dist').innerText = d;
        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline([userPos, pinMarker.getLatLng()], { color: 'var(--neon)', dashArray: '5, 10' }).addTo(map);
    }

    function changeHole(dir) {
        currentHole = Math.max(1, Math.min(18, currentHole + dir));
        document.getElementById('cur-hole-num').innerText = currentHole;
        if (pinMarker) map.removeLayer(pinMarker); // Reset pin for new hole
    }

    // SCORING FUNCTIONS
    function openHoleScore() {
        document.getElementById('log-title').innerText = `LOG SCORE: HOLE ${currentHole}`;
        const container = document.getElementById('player-score-inputs');
        container.innerHTML = players.map((p, i) => `
            <div class="score-row">
                <span>${p.name}</span>
                <input type="number" class="p-score-in" data-idx="${i}" value="4" style="width:60px; margin:0;">
            </div>
        `).join('');
        document.getElementById('mod-score').classList.remove('hidden');
    }

    function saveHoleAndNext() {
        const inputs = document.querySelectorAll('.p-score-in');
        inputs.forEach(input => {
            const idx = input.getAttribute('data-idx');
            players[idx].scores[currentHole] = parseInt(input.value);
        });

        document.getElementById('mod-score').classList.add('hidden');
        if (currentHole === 18) {
            alert("ROUND FINISHED! Back to start.");
            location.reload();
        } else {
            changeHole(1);
        }
    }

    function toggleScoreView() {
        let summary = players.map(p => {
            let total = Object.values(p.scores).reduce((a, b) => a + b, 0);
            return `${p.name}: ${total}`;
        }).join('\n');
        alert("LIVE ROUND TOTALS:\n" + summary);
    }
</script>
</body>
</html>
