<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vulcan Golf: 3D Flyover</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --purple: #7a00ff; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        /* HUD */
        .hud { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--neon); box-sizing: border-box; }
        .val { font-size: 30px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        /* 3D Map Viewport */
        #map-wrap { flex-grow: 1; position: relative; perspective: 600px; overflow: hidden; background: #000; }
        #map { 
            width: 100%; height: 160%; /* Taller for deeper tilt */
            transform: rotateX(45deg); transform-origin: bottom;
            filter: saturate(1.5) contrast(1.2) brightness(0.9);
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; }
        .controls { position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="scr-setup" class="screen" style="padding:40px 20px;">
    <h2 style="color:var(--neon)">VULCAN 3D FLYOVER</h2>
    <div style="background:var(--panel); padding:20px; border-radius:12px;">
        <input type="text" id="loc-in" value="Byesville, Ohio" style="width:100%; background:#000; border:1px solid #444; color:white; padding:12px; margin-bottom:20px; border-radius:8px;">
        <button class="btn" onclick="startFlyoverRound()">START 18 HOLE SESSION</button>
    </div>
</div>

<div id="scr-game" class="screen hidden" style="overflow:hidden;">
    <div class="hud">
        <div><span id="h-num" style="font-size:20px; font-weight:900;">H1</span></div>
        <div style="text-align:right;">
            <span id="h-par" style="color:#666; font-size:12px; font-weight:bold; margin-right:10px;">PAR 4</span>
            <span id="dist" class="val">0</span><span style="font-size:10px; color:var(--neon);"> YDS</span>
        </div>
    </div>
    
    <div id="map-wrap"><div id="map"></div></div>

    <div class="controls">
        <button class="btn" style="background:#000; color:var(--neon); border:1px solid var(--neon);" onclick="alert('Scorecard logged for players')">PLAYERS</button>
        <button class="btn" onclick="nextHoleWithFlyover()">NEXT HOLE ➜</button>
    </div>
</div>

<script>
    let currentHole = 1, map, userPos, flagPos, userMarker, flagMarker;

    async function startFlyoverRound() {
        const loc = document.getElementById('loc-in').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(loc)}`);
        const data = await res.json();
        
        if (data.length > 0) {
            userPos = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            document.getElementById('scr-setup').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
            initMap();
        }
    }

    function initMap() {
        // High zoom level (20) for "Much Closer" layout
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(userPos, 20);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 10, fillOpacity: 1 }).addTo(map);
        triggerFlyover();
    }

    function triggerFlyover() {
        // 1. Calculate flag
        const offset = 0.002 + (currentHole * 0.0001);
        flagPos = [userPos[0] + offset, userPos[1] + offset];
        
        if (flagMarker) map.removeLayer(flagMarker);
        flagMarker = L.marker(flagPos, { icon: L.divIcon({ html: '🚩', className: 'f' }) }).addTo(map);
        
        // 2. Flyover Animation Sequence
        const mapEl = document.getElementById('map');
        mapEl.style.transform = "rotateX(10deg) translateY(0px)"; // Zoom Out look
        
        setTimeout(() => {
            map.flyTo(flagPos, 21, { duration: 3 }); // Zoom in closer on green
            mapEl.style.transform = "rotateX(60deg) translateY(-100px)"; // Deep 3D tilt at flag
        }, 100);

        updateHUD();
    }

    function updateHUD() {
        const d = Math.round(map.distance(userPos, flagPos) * 1.09361);
        document.getElementById('dist').innerText = d;
        document.getElementById('h-par').innerText = "PAR " + (Math.floor(Math.random()*3)+3);
    }

    function nextHoleWithFlyover() {
        if (currentHole >= 18) {
            alert("ROUND COMPLETE. STARTING NEW SESSION.");
            location.reload();
        } else {
            currentHole++;
            document.getElementById('h-num').innerText = "H" + currentHole;
            map.setView(userPos, 20); // Reset camera to player for start of flyover
            setTimeout(triggerFlyover, 500);
        }
    }
</script>
</body>
</html>
