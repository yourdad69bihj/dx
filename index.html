<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Golf Auto-GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --alert: #ff0055; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 3D Drone Perspective */
        #viewport { perspective: 1000px; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #map { 
            width: 100%; height: 150%; 
            transform: rotateX(45deg); transform-origin: bottom;
            filter: saturate(1.4) contrast(1.1) brightness(0.8);
        }

        /* HUD & Overlays */
        .hud-top { position: absolute; top: 0; width: 100%; z-index: 1000; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; }
        .dist-card { background: rgba(0,0,0,0.6); border: 1px solid var(--neon); padding: 10px 20px; border-radius: 8px; text-align: center; backdrop-filter: blur(5px); }
        .val { font-size: 36px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
        .box { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        input, select { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin: 10px 0; font-family: inherit; }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        
        .controls { position: absolute; bottom: 30px; left: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="setup-ui" class="setup-screen">
    <h1 style="color:var(--neon); margin:0;">VULCAN GOLF</h1>
    <p style="font-size:10px; color:#666; letter-spacing:2px; margin-bottom:30px;">AUTO-YARDAGE ENGINE</p>
    
    <div class="box">
        <label style="font-size:10px; color:var(--neon);">1. SELECT COURSE</label>
        <select id="course-select">
            <option value="auto">📍 Nearest Course (Auto-Detect)</option>
            <option value="custom">Custom Location</option>
        </select>

        <label style="font-size:10px; color:var(--neon);">2. PLAYERS</label>
        <input type="number" id="p-count" value="1" min="1" max="4" style="width:60px;">
        <div id="p-names">
            <input type="text" placeholder="Player 1 Name" class="p-name" value="Jordan">
        </div>
    </div>
    <button class="btn" onclick="startRound()">Start Session</button>
</div>

<div class="hud-top">
    <div>
        <span style="font-size:10px; color:#555; display:block;">AUTO-FLAG TRACKING</span>
        <span id="course-name" style="font-size:18px; font-weight:bold;">Finding Course...</span>
    </div>
    <div class="dist-card">
        <span class="val" id="auto-dist">--</span>
        <span style="font-size:9px; display:block; color:var(--neon);">YARDS TO PIN</span>
    </div>
</div>

<div id="viewport"><div id="map"></div></div>

<div class="controls">
    <button class="btn" style="background:#000; color:var(--neon); border:1px solid var(--neon);" onclick="toggleScorecard()">Scorecard</button>
    <button class="btn" onclick="logScore()">Log Hole</button>
</div>

<script>
    let players = [], map, userPos, flagPos, userMarker, flagMarker, pathLine;

    // 1. Session Setup
    function startRound() {
        const names = document.querySelectorAll('.p-name');
        players = Array.from(names).map(n => ({ name: n.value, scores: {} }));
        document.getElementById('setup-ui').style.display = 'none';
        initEngine();
    }

    // 2. Map & Auto-Distance Engine
    function initEngine() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 8, fillOpacity: 1 }).addTo(map);
                map.setView(userPos, 19);
                findNearestFlag(userPos); // Auto-find flag when GPS starts
            } else {
                userMarker.setLatLng(userPos);
            }
            updateYardage();
        }, null, { enableHighAccuracy: true });
    }

    // 3. Auto-Flag Logic (Simulated Overpass API)
    function findNearestFlag(pos) {
        document.getElementById('course-name').innerText = "Course Detected";
        // Logic: Search for 'leisure=golf_course' and 'golf=pin'
        // For the demo, we place a flag 250 yards ahead of your starting position
        const offset = 0.002; 
        flagPos = [pos[0] + offset, pos[1] + offset];
        
        if (flagMarker) map.removeLayer(flagMarker);
        flagMarker = L.marker(flagPos, {
            icon: L.divIcon({ className:'f', html:'<div style="font-size:25px;">🚩</div>' })
        }).addTo(map);
    }

    function updateYardage() {
        if (!userPos || !flagPos) return;
        const dMeters = map.distance(userPos, flagPos);
        const dYards = Math.round(dMeters * 1.09361);
        document.getElementById('auto-dist').innerText = dYards;
        
        if (pathLine) map.removeLayer(pathLine);
        pathLine = L.polyline([userPos, flagPos], { color: 'var(--neon)', weight: 3, dashArray: '10, 15' }).addTo(map);
        
        // Tilt the view toward the flag
        const bounds = L.latLngBounds([userPos, flagPos]);
        map.fitBounds(bounds, { padding: [100, 100] });
    }

    function logScore() {
        let s = prompt("Enter score for " + players[0].name);
        alert("Score Logged. Next Hole GPS Activating...");
        // Auto-move flag to simulate next hole
        flagPos = [flagPos[0] + 0.003, flagPos[1] + 0.001];
        flagMarker.setLatLng(flagPos);
        updateYardage();
    }

    function toggleScorecard() {
        alert("Total Score: " + players[0].name + " (Even Par)");
    }
</script>
</body>
</html>
