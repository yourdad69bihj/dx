<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Guard IR</title>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --alert: #ff0055; --ir-glow: rgba(255, 60, 0, 0.4); }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .ui-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; border: 2px solid var(--ir-glow); }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(1.2) contrast(1.5) saturate(0) sepia(1) hue-rotate(320deg); opacity: 0.6; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 10; }

        /* Sidebar */
        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 80px; 
            background: rgba(20, 0, 0, 0.8); border-left: 2px solid var(--alert); 
            display: flex; align-items: center; justify-content: center; z-index: 1000; pointer-events: auto;
        }
        .fine-btn { 
            transform: rotate(90deg); background: var(--alert); color: white; padding: 25px 50px; 
            border: none; font-weight: 900; letter-spacing: 3px; border-radius: 5px; cursor: pointer;
            box-shadow: 0 0 30px var(--alert); font-size: 16px;
        }

        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 0, 0.7); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
            animation: flash 0.5s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--alert); top: 0; animation: scan 4s linear infinite; z-index: 101; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div id="alarm-overlay">
    <h1 style="font-size: 40px; text-shadow: 0 0 20px #000;">STABILIZE DETECTED</h1>
    <p>TAP SIDEBAR TO RESET</p>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="motionCanvas"></canvas>
<div class="ui-layer"><div class="scan-line"></div></div>

<div class="sidebar">
    <button class="fine-btn" onclick="resetSystem()">I'M FINE</button>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const overlay = document.getElementById('alarm-overlay');

    let prevFrame = null;
    let jitterBuffer = [];
    let isAlarming = false;
    let audioCtx = null;
    let siren = null;

    // Initialize Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; requestAnimationFrame(processFrame); })
        .catch(() => alert("Camera permission required for IR Tracking."));

    function processFrame() {
        if (video.paused || video.ended) return;
        
        // Sync canvas size
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        if (prevFrame) {
            let movementSum = 0;
            // High-Performance Frame Differencing
            for (let i = 0; i < currentFrame.data.length; i += 40) { // Sample every 10th pixel for speed
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                if (diff > 40) {
                    movementSum++;
                    // Draw "Heat" Pixels
                    ctx.fillStyle = "rgba(255, 100, 0, 0.8)";
                    const x = (i / 4) % canvas.width;
                    const y = Math.floor((i / 4) / canvas.width);
                    ctx.fillRect(x, y, 5, 5);
                }
            }

            // Track jitter frequency
            jitterBuffer.push(movementSum);
            if (jitterBuffer.length > 15) jitterBuffer.shift();

            checkSeizure(movementSum);
        }

        prevFrame = currentFrame;
        requestAnimationFrame(processFrame);
    }

    function checkSeizure(currentMove) {
        if (isAlarming) return;

        // Compare current movement against recent average to find "shaking" patterns
        const avg = jitterBuffer.reduce((a, b) => a + b, 0) / jitterBuffer.length;
        const jitterIntensity = Math.abs(currentMove - avg);

        // Threshold for rapid movement detection
        if (jitterIntensity > 800 && currentMove > 500) {
            triggerAlarm();
        }
    }

    function triggerAlarm() {
        isAlarming = true;
        overlay.style.display = 'flex';
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // High-Intensity Siren
        siren = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        siren.type = 'sawtooth';
        siren.frequency.setValueAtTime(440, audioCtx.currentTime);
        siren.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
        siren.loop = true;
        
        gain.gain.value = 0.5;
        siren.connect(gain);
        gain.connect(audioCtx.destination);
        siren.start();
    }

    function resetSystem() {
        isAlarming = false;
        jitterBuffer = [];
        overlay.style.display = 'none';
        if (siren) {
            siren.stop();
            siren = null;
        }
    }
</script>
</body>
</html>
