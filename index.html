<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Golf Ultimate</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --purple: #7a00ff; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; overflow-y: auto; }
        .hidden { display: none !important; }

        /* UI Elements */
        .box { background: var(--panel); border: 1px solid #333; padding: 15px; border-radius: 12px; margin: 10px; cursor: pointer; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--neon); padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 10px; }

        /* Game HUD */
        .hud { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.85); z-index: 1000; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon); backdrop-filter: blur(5px); }
        #map-wrap { flex-grow: 1; position: relative; perspective: 1000px; overflow: hidden; }
        #map { width: 100%; height: 130%; transform: rotateX(30deg); transform-origin: bottom; filter: saturate(1.3); }

        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="scr-setup" class="screen">
    <div style="padding:30px 20px;">
        <h2 style="color:var(--neon)">VULCAN GOLF SETUP</h2>
        <div class="box">
            <span style="font-size:10px; color:#666;">SELECT NEARBY COURSE</span>
            <div id="course-list">
                <div class="box" style="margin:10px 0; border-color:var(--neon);" onclick="pickCourse('Augusta National')">📍 Augusta National (Nearby)</div>
                <div class="box" style="margin:10px 0;" onclick="pickCourse('Pebble Beach')">📍 Pebble Beach (Nearby)</div>
            </div>
        </div>
        
        <div class="box" id="player-config">
            <span style="font-size:10px; color:#666;">PLAYERS & HOLES</span>
            <input type="number" id="p-count" value="1" placeholder="How many players?" onchange="genInputs()">
            <div id="p-inputs"></div>
            <select id="hole-count" style="width:100%; background:#000; color:white; padding:12px; border-radius:8px; border:1px solid #444;">
                <option value="9">Play 9 Holes</option>
                <option value="18" selected>Play 18 Holes</option>
            </select>
            <button class="btn" onclick="startSession()">START SESSION</button>
        </div>
    </div>
</div>

<div id="scr-game" class="screen hidden" style="overflow:hidden;">
    <div class="hud">
        <div><b id="h-num">H1</b> <span style="color:#666; font-size:10px;">PAR <span id="h-par">4</span></span></div>
        <div style="text-align:center;"><span id="dist" style="font-size:24px; font-weight:900; color:var(--neon);">0</span><br><span style="font-size:8px;">YARDS TO PIN</span></div>
        <div onclick="showFullScore()" style="color:var(--purple); font-size:10px; font-weight:bold;">SCORECARD ☰</div>
    </div>

    <div id="map-wrap"><div id="map"></div></div>

    <div style="position:absolute; bottom:20px; left:20px; right:20px; z-index:1000;">
        <button class="btn" style="box-shadow: 0 0 20px var(--neon);" onclick="openScoreInput()">LOG SCORE & NEXT HOLE</button>
    </div>
</div>

<div id="mod-score" class="screen hidden" style="background:rgba(0,0,0,0.95); z-index:2000;">
    <div style="padding:40px 20px;">
        <h2 id="log-title">LOG HOLE 1</h2>
        <div id="score-fields"></div>
        <button class="btn" onclick="nextHole()">NEXT HOLE ➜</button>
    </div>
</div>

<div id="scr-final" class="screen hidden">
    <div style="padding:40px 20px; text-align:center;">
        <h1 style="color:var(--neon)">ROUND COMPLETE</h1>
        <div id="final-stats" class="box"></div>
        <button class="btn" onclick="location.reload()">START NEW SESSION</button>
    </div>
</div>

<script>
    let players = [], currentHole = 1, totalHoles = 18;
    let map, userPos, pinMarker, userMarker, trace;

    function genInputs() {
        const c = document.getElementById('p-count').value;
        const div = document.getElementById('p-inputs'); div.innerHTML = "";
        for(let i=0; i<c; i++) div.innerHTML += `<input type="text" class="pn" placeholder="Player ${i+1}" value="Player ${i+1}">`;
    }

    function pickCourse(name) { alert("Selected: " + name); }

    function startSession() {
        const names = document.querySelectorAll('.pn');
        players = Array.from(names).map(n => ({ name: n.value, scores: [] }));
        totalHoles = parseInt(document.getElementById('hole-count').value);
        document.getElementById('scr-setup').classList.add('hidden');
        document.getElementById('scr-game').classList.remove('hidden');
        initMap();
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 8, fillOpacity: 1 }).addTo(map);
                map.setView(userPos, 19);
                setHoleTarget(); // Auto-place pin ahead
            } else userMarker.setLatLng(userPos);
            updateView();
        }, null, { enableHighAccuracy: true });
    }

    function setHoleTarget() {
        // Simulating hole coordinates
        const offset = 0.002 + (currentHole * 0.0001);
        const pinPos = [userPos[0] + offset, userPos[1] + offset];
        if (pinMarker) map.removeLayer(pinMarker);
        pinMarker = L.marker(pinPos, { icon: L.divIcon({ html: '🚩', className: 'pin' }) }).addTo(map);
        document.getElementById('h-par').innerText = [3,4,5][Math.floor(Math.random()*3)];
    }

    function updateView() {
        if (!userPos || !pinMarker) return;
        const d = Math.round(map.distance(userPos, pinMarker.getLatLng()) * 1.09361);
        document.getElementById('dist').innerText = d;
        if (trace) map.removeLayer(trace);
        trace = L.polyline([userPos, pinMarker.getLatLng()], { color: 'var(--neon)', dashArray: '10, 15' }).addTo(map);
    }

    function openScoreInput() {
        document.getElementById('log-title').innerText = `LOG HOLE ${currentHole}`;
        const div = document.getElementById('score-fields');
        div.innerHTML = players.map((p, i) => `
            <div class="score-row"><span>${p.name}</span> <input type="number" class="ps" data-idx="${i}" value="4" style="width:60px;"></div>
        `).join('');
        document.getElementById('mod-score').classList.remove('hidden');
    }

    function nextHole() {
        const ins = document.querySelectorAll('.ps');
        ins.forEach(i => players[i.dataset.idx].scores.push(parseInt(i.value)));
        
        document.getElementById('mod-score').classList.add('hidden');
        if (currentHole >= totalHoles) showEnd();
        else {
            currentHole++;
            document.getElementById('h-num').innerText = `H${currentHole}`;
            setHoleTarget();
        }
    }

    function showEnd() {
        document.getElementById('scr-game').classList.add('hidden');
        document.getElementById('scr-final').classList.remove('hidden');
        const div = document.getElementById('final-stats');
        div.innerHTML = players.map(p => `
            <div style="margin-bottom:10px;">
                <b>${p.name}</b>: Total ${p.scores.reduce((a,b)=>a+b, 0)}
                <div style="font-size:10px; color:#666;">Scores: ${p.scores.join(', ')}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
