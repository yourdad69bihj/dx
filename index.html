<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Golf Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --grass: #00ff41; --purple: #7a00ff; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Navigation Tabs */
        .tabs { display: flex; background: #000; border-bottom: 1px solid var(--neon); z-index: 2000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 11px; font-weight: bold; color: #444; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); background: rgba(0, 242, 234, 0.1); }

        .view { flex-grow: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .hidden { display: none !important; }

        /* GPS Overlay */
        .stats-overlay { 
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(11, 12, 16, 0.85); padding: 12px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-around; text-align: center; backdrop-filter: blur(4px);
        }
        .stat-box { flex: 1; }
        .val { font-size: 22px; font-weight: 900; color: var(--neon); display: block; }
        .lbl { font-size: 8px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        #map { flex-grow: 1; width: 100%; background: #111; }

        /* Scorecard Table */
        .score-view { padding: 20px; overflow-y: auto; background: var(--bg); }
        .score-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .score-table th { color: var(--purple); text-align: left; padding: 10px; border-bottom: 1px solid #333; font-size: 10px; }
        .score-table td { padding: 10px; border-bottom: 1px solid #222; }
        input[type="number"] { width: 45px; background: #000; border: 1px solid #444; color: var(--neon); text-align: center; padding: 5px; border-radius: 4px; }

        .total-box { margin-top: 20px; padding: 15px; background: var(--panel); border: 1px solid var(--purple); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }

        .btn { background: var(--neon); color: #000; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" id="tab-gps" onclick="switchTab('gps')">Live GPS</div>
        <div class="tab" id="tab-score" onclick="switchTab('score')">Scorecard</div>
    </div>

    <div id="view-gps" class="view">
        <div class="stats-overlay">
            <div class="stat-box">
                <span class="val" id="dist-val">0</span>
                <span class="lbl">Yards</span>
            </div>
            <div class="stat-box" style="border-left: 1px solid #333; border-right: 1px solid #333;">
                <span class="val" id="club-val">--</span>
                <span class="lbl">Club</span>
            </div>
            <div class="stat-box">
                <span class="val" id="acc-val">Searching</span>
                <span class="lbl">Signal</span>
            </div>
        </div>
        <div id="map"></div>
        <div style="position:absolute; bottom:20px; left:20px; right:20px; z-index:1000; display:flex; gap:10px;">
            <button class="btn" style="flex:1" onclick="centerMap()">📍 Center GPS</button>
            <button class="btn" style="flex:1; background:var(--purple); color:white;" onclick="clearTarget()">❌ Clear Target</button>
        </div>
    </div>

    <div id="view-score" class="view score-view hidden">
        <h2 style="color:var(--neon); margin:0 0 10px 0; font-size: 18px;">ROUND TRACKER</h2>
        <table class="score-table">
            <thead>
                <tr>
                    <th>HOLE</th>
                    <th>STROKES</th>
                    <th>PUTTS</th>
                </tr>
            </thead>
            <tbody id="score-body">
                </tbody>
        </table>
        <div class="total-box">
            <div>
                <span class="lbl">TOTAL SCORE</span>
                <span id="final-score" style="display:block; font-size: 24px; font-weight: 900; color: var(--purple);">0</span>
            </div>
            <button class="btn" style="background:#ff4444; color:white;" onclick="resetScore()">Reset Round</button>
        </div>
    </div>
</div>

<script>
    let map, userMarker, targetMarker, polyline, userPos = null;
    let scores = JSON.parse(localStorage.getItem('golf_scores') || "[]");

    // Club Distances
    const CLUBS = [
        { name: "D", d: 240 }, { name: "3W", d: 215 }, { name: "5W", d: 195 },
        { name: "4I", d: 180 }, { name: "5I", d: 170 }, { name: "6I", d: 160 },
        { name: "7I", d: 150 }, { name: "8I", d: 140 }, { name: "9I", d: 130 },
        { name: "PW", d: 115 }, { name: "SW", d: 95 }
    ];

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('view-gps').classList.toggle('hidden', t !== 'gps');
        document.getElementById('view-score').classList.toggle('hidden', t !== 'score');
        if (t === 'gps' && map) setTimeout(() => map.invalidateSize(), 100);
    }

    // MAP ENGINE
    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, accuracy } = pos.coords;
            userPos = [latitude, longitude];
            document.getElementById('acc-val').innerText = accuracy < 10 ? "High" : "Low";
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 7, fillOpacity: 1 }).addTo(map);
                map.setView(userPos, 18);
            } else { userMarker.setLatLng(userPos); }
            if (targetMarker) calcDist();
        }, null, { enableHighAccuracy: true });

        map.on('click', e => {
            if (targetMarker) map.removeLayer(targetMarker);
            targetMarker = L.marker(e.latlng).addTo(map);
            calcDist();
        });
    }

    function calcDist() {
        if (!userPos || !targetMarker) return;
        const dist = Math.round(map.distance(userPos, targetMarker.getLatLng()) * 1.09361);
        document.getElementById('dist-val').innerText = dist;
        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline([userPos, targetMarker.getLatLng()], { color: 'var(--neon)', weight: 2, dashArray: '5, 8' }).addTo(map);
        const club = CLUBS.find(c => c.d <= dist + 10) || CLUBS[0];
        document.getElementById('club-val').innerText = dist < 20 ? "P" : club.name;
    }

    function clearTarget() {
        if (targetMarker) map.removeLayer(targetMarker);
        if (polyline) map.removeLayer(polyline);
        document.getElementById('dist-val').innerText = "0";
        document.getElementById('club-val').innerText = "--";
    }

    function centerMap() { if (userPos) map.setView(userPos, 18); }

    // SCORECARD ENGINE
    function initScorecard() {
        const body = document.getElementById('score-body');
        body.innerHTML = "";
        for (let i = 1; i <= 18; i++) {
            const row = document.createElement('tr');
            const data = scores[i-1] || { s: 0, p: 0 };
            row.innerHTML = `
                <td style="color:#666">Hole ${i}</td>
                <td><input type="number" value="${data.s}" onchange="updateScore(${i-1}, 's', this.value)"></td>
                <td><input type="number" value="${data.p}" onchange="updateScore(${i-1}, 'p', this.value)"></td>
            `;
            body.appendChild(row);
        }
        calculateTotal();
    }

    function updateScore(hole, type, val) {
        if (!scores[hole]) scores[hole] = { s: 0, p: 0 };
        scores[hole][type] = parseInt(val) || 0;
        localStorage.setItem('golf_scores', JSON.stringify(scores));
        calculateTotal();
    }

    function calculateTotal() {
        const total = scores.reduce((acc, curr) => acc + (curr.s || 0), 0);
        document.getElementById('final-score').innerText = total;
    }

    function resetScore() {
        if (confirm("Reset Round?")) {
            scores = [];
            localStorage.setItem('golf_scores', "[]");
            initScorecard();
        }
    }

    window.onload = () => { initMap(); initScorecard(); };
</script>
</body>
</html>
