<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Guard: Human Only</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/data/face-min.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --alert: #ff0055; --tracking: #ff0000; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .viewport { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: grayscale(1) contrast(1.2); }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 10; }

        /* UI Elements */
        .status-ui { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); }
        .dot { height: 8px; width: 8px; background: var(--tracking); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--tracking); }

        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 85px; 
            background: rgba(10, 0, 0, 0.9); border-left: 2px solid var(--alert); 
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .fine-btn { 
            transform: rotate(90deg); background: var(--alert); color: white; padding: 25px 55px; 
            border: none; font-weight: 900; letter-spacing: 4px; border-radius: 6px; cursor: pointer;
            box-shadow: 0 0 30px var(--alert); font-size: 16px;
        }

        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 85, 0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
            animation: pulse 0.4s infinite; pointer-events: none;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="alarm-overlay">
    <h1 style="font-size: 40px; text-align: center; text-transform: uppercase;">Human Distress Detected</h1>
    <p>TAP SIDEBAR TO RESET SYSTEM</p>
</div>

<div class="viewport">
    <div class="status-ui"><span class="dot"></span> Human Scan Active</div>
    <video id="video" preload autoplay loop muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="sidebar">
        <button class="fine-btn" onclick="resetSystem()">I'M FINE</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const alarmOverlay = document.getElementById('alarm-overlay');
    
    let isEmergency = false;
    let audioCtx = null;
    let alarmOscillator = null;
    let personHistory = [];

    // 1. Start Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { 
            video.srcObject = stream; 
            // Unlock audio context on first click
            window.addEventListener('click', () => { if(!audioCtx) audioCtx = new AudioContext(); }, {once: true});
        });

    // 2. Human Face/Object Tracker
    const tracker = new tracking.ObjectTracker(['face']);
    tracker.setInitialScale(4);
    tracker.setStepSize(2);
    tracker.setEdgesDensity(0.1);

    tracker.on('track', function(event) {
        if (isEmergency) return;
        context.clearRect(0, 0, canvas.width, canvas.height);

        event.data.forEach(function(rect) {
            // Highlight Person in Red
            context.strokeStyle = '#ff0000';
            context.lineWidth = 4;
            context.strokeRect(rect.x, rect.y, rect.width, rect.height);
            
            analyzeJitter(rect);
        });
    });

    // 3. Jitter Detection for People
    function analyzeJitter(rect) {
        const center = { x: rect.x + rect.width/2, y: rect.y + rect.height/2 };
        personHistory.push(center);

        if (personHistory.length > 15) {
            personHistory.shift();
            
            let totalDev = 0;
            for(let i = 1; i < personHistory.length; i++) {
                totalDev += Math.abs(personHistory[i].x - personHistory[i-1].x);
                totalDev += Math.abs(personHistory[i].y - personHistory[i-1].y);
            }

            // If the person's face/body is vibrating rapidly
            if (totalDev > 400) {
                triggerEmergency();
            }
        }
    }

    tracking.track('#video', tracker);

    function triggerEmergency() {
        if (isEmergency || !audioCtx) return;
        isEmergency = true;
        alarmOverlay.style.display = 'flex';
        
        // High-Pitch Safety Siren
        alarmOscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        alarmOscillator.type = 'sawtooth';
        alarmOscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
        alarmOscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
        
        gain.gain.value = 1.0;
        alarmOscillator.connect(gain);
        gain.connect(audioCtx.destination);
        alarmOscillator.start();
    }

    function resetSystem() {
        isEmergency = false;
        personHistory = [];
        alarmOverlay.style.display = 'none';
        if (alarmOscillator) {
            alarmOscillator.stop();
            alarmOscillator = null;
        }
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
</script>
</body>
</html>
