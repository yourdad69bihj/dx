<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Golf Auto-Scan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --alert: #ff0055; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        /* Setup UI */
        .setup-content { padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .box { background: var(--panel); border: 1px solid #333; padding: 15px; border-radius: 12px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--neon); padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* 3D Map Viewport */
        #map-wrap { flex-grow: 1; position: relative; perspective: 1000px; overflow: hidden; }
        #map { width: 100%; height: 140%; transform: rotateX(35deg); transform-origin: bottom; filter: saturate(1.4) brightness(0.9); }

        /* HUD */
        .hud { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 1000; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon); }
        .val { font-size: 28px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div id="scr-setup" class="screen">
    <div class="setup-content">
        <h2 style="color:var(--neon); margin:0;">VULCAN GOLF</h2>
        <p id="status" style="font-size:10px; color:#666;">SCANNING FOR NEAREST COURSE...</p>
        
        <div class="box">
            <label style="font-size:10px; color:#555;">PLAYERS (MAX 50)</label>
            <input type="number" id="p-count" value="1" min="1" max="50" onchange="genSlots()">
            <div id="p-slots" style="max-height:180px; overflow-y:auto; margin-top:10px;"></div>
        </div>

        <button class="btn" id="start-btn" disabled onclick="startRound()">START SESSION</button>
    </div>
</div>

<div id="scr-game" class="screen hidden" style="overflow:hidden;">
    <div class="hud">
        <div>
            <span id="h-num" style="font-size:18px; font-weight:bold;">HOLE 1</span>
            <span id="h-par" style="color:var(--neon); margin-left:10px;">PAR 4</span>
        </div>
        <div style="text-align:right;">
            <span id="dist" class="val">0</span>
            <span style="font-size:8px; display:block;">YARDS TO PIN</span>
        </div>
    </div>
    
    <div id="map-wrap"><div id="map"></div></div>

    <div style="position:absolute; bottom:20px; left:20px; right:20px; z-index:1000;">
        <button class="btn" style="box-shadow: 0 0 20px var(--neon);" onclick="logAndNext()">LOG SCORE & NEXT HOLE</button>
    </div>
</div>

<div id="scr-final" class="screen hidden" style="padding:40px 20px; text-align:center;">
    <h1 style="color:var(--neon)">ROUND COMPLETE</h1>
    <div id="final-stats" class="box" style="text-align:left;"></div>
    <button class="btn" onclick="location.reload()">START NEW SESSION</button>
</div>

<script>
    let players = [], currentHole = 1, map, userPos, flagPos, userMarker, flagMarker, pathLine;
    let courseName = "";

    // 1. Auto-Scan Nearest Course
    navigator.geolocation.getCurrentPosition(pos => {
        userPos = [pos.coords.latitude, pos.coords.longitude];
        const query = `[out:json];nwr["leisure"="golf_course"](around:5000,${userPos[0]},${userPos[1]});out center;`;
        fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query))
            .then(r => r.json())
            .then(data => {
                if (data.elements.length > 0) {
                    courseName = data.elements[0].tags.name || "Local Course";
                    document.getElementById('status').innerText = "DETECTED: " + courseName;
                    document.getElementById('start-btn').disabled = false;
                } else {
                    document.getElementById('status').innerText = "NO COURSE FOUND. USING CUSTOM MODE.";
                    document.getElementById('start-btn').disabled = false;
                }
            });
    });

    function genSlots() {
        const c = document.getElementById('p-count').value;
        const div = document.getElementById('p-slots'); div.innerHTML = "";
        for(let i=0; i<c; i++) div.innerHTML += `<input type="text" class="pn" placeholder="Player ${i+1}" value="Player ${i+1}">`;
    }

    function startRound() {
        const names = document.querySelectorAll('.pn');
        players = Array.from(names).map(n => ({ name: n.value, scores: [] }));
        document.getElementById('scr-setup').classList.add('hidden');
        document.getElementById('scr-game').classList.remove('hidden');
        initMap();
    }

    // 2. 3D Map & Diagram Logic
    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(userPos, 19);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 8, fillOpacity: 1 }).addTo(map);
        
        // Auto-Detect Flag Position (Simulated from Course Data)
        findHoleData();
    }

    function findHoleData() {
        // In a real session, this pulls 'golf=pin' coordinates from OSM
        flagPos = [userPos[0] + 0.002, userPos[1] + 0.0015];
        if (flagMarker) map.removeLayer(flagMarker);
        flagMarker = L.marker(flagPos, { icon: L.divIcon({ html: '🚩', className: 'f' }) }).addTo(map);
        document.getElementById('h-par').innerText = "PAR " + (Math.floor(Math.random()*3)+3);
        updateYardage();
    }

    function updateYardage() {
        const d = Math.round(map.distance(userPos, flagPos) * 1.09361);
        document.getElementById('dist').innerText = d;
        if (pathLine) map.removeLayer(pathLine);
        pathLine = L.polyline([userPos, flagPos], { color: 'var(--neon)', dashArray: '10, 15' }).addTo(map);
        
        // Perspective adjustment toward the flag
        const bounds = L.latLngBounds([userPos, flagPos]);
        map.fitBounds(bounds, { padding: [100, 100] });
    }

    function logAndNext() {
        players.forEach(p => {
            let s = prompt(`Enter strokes for ${p.name} on Hole ${currentHole}`, "4");
            p.scores.push(parseInt(s) || 4);
        });

        if (currentHole >= 18) {
            showSummary();
        } else {
            currentHole++;
            document.getElementById('h-num').innerText = "HOLE " + currentHole;
            // Move flag to simulate new hole layout
            flagPos = [flagPos[0] + 0.001, flagPos[1] + 0.002];
            flagMarker.setLatLng(flagPos);
            updateYardage();
        }
    }

    function showSummary() {
        document.getElementById('scr-game').classList.add('hidden');
        document.getElementById('scr-final').classList.remove('hidden');
        const div = document.getElementById('final-stats');
        div.innerHTML = players.map(p => `
            <div style="margin-bottom:12px;">
                <b>${p.name}</b>: Total ${p.scores.reduce((a,b)=>a+b, 0)}
                <div style="font-size:10px; color:#666;">Holes: ${p.scores.join(', ')}</div>
            </div>
        `).join('');
    }

    genSlots();
</script>
</body>
</html>
