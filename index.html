<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Guard: IR Tracer PRO</title>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --alert: #ff0055; --ir-heat: #ff3c00; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(1.1) contrast(1.8) saturate(0) sepia(1) hue-rotate(320deg) invert(1); 
            opacity: 0.35; 
        }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 10; pointer-events: none; }
        #trailCanvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; opacity: 0.7; pointer-events: none; }

        /* UI Overlays */
        .ui-header { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--ir-heat); font-weight: bold; }
        .dot { height: 8px; width: 8px; background: var(--ir-heat); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--ir-heat); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Small Flip Camera Button */
        .flip-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); border: 1px solid var(--neon); color: var(--neon);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.3);
        }

        /* Sidebar - HIDDEN BY DEFAULT */
        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 85px; 
            background: rgba(20, 0, 0, 0.95); border-left: 2px solid var(--alert); 
            display: none; align-items: center; justify-content: center; z-index: 1100;
            box-shadow: -10px 0 30px rgba(255, 0, 0, 0.3);
        }
        .fine-btn { 
            transform: rotate(90deg); background: var(--alert); color: white; padding: 25px 55px; 
            border: none; font-weight: 900; letter-spacing: 4px; border-radius: 6px; cursor: pointer;
            box-shadow: 0 0 30px var(--alert); font-size: 16px; white-space: nowrap;
        }

        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 0, 0.6); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
            animation: pulse 0.3s infinite; pointer-events: none;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="alarm-overlay">
    <h1 style="font-size: 35px; text-align: center; font-weight: 900; text-transform: uppercase; color: white;">Motion Warning</h1>
</div>

<div class="viewport">
    <div class="ui-header"><span class="dot"></span> IR TRACER v3.0</div>
    
    <button class="flip-btn" onclick="flipCamera()">🔄</button>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="trailCanvas"></canvas>
    <canvas id="canvas"></canvas>

    <div class="sidebar" id="safety-sidebar">
        <button class="fine-btn" onclick="resetSystem()">I'M FINE</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const trailCanvas = document.getElementById('trailCanvas');
    const trailCtx = trailCanvas.getContext('2d');
    const sidebar = document.getElementById('safety-sidebar');
    const alarmOverlay = document.getElementById('alarm-overlay');
    
    let prevFrame = null;
    let jitterBuffer = [];
    let isAlarming = false;
    let audioCtx = null;
    let siren = null;
    let currentFacingMode = "environment"; // Default to back camera

    async function startCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode } 
            });
            video.srcObject = stream;
            requestAnimationFrame(analyze);
        } catch (err) {
            alert("Camera Error: Please allow access.");
        }
    }

    function flipCamera() {
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        startCamera();
    }

    function analyze() {
        if (isAlarming) return requestAnimationFrame(analyze);

        if (canvas.width !== video.videoWidth) {
            canvas.width = trailCanvas.width = video.videoWidth;
            canvas.height = trailCanvas.height = video.videoHeight;
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        trailCtx.fillStyle = 'rgba(0, 0, 0, 0.08)'; 
        trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);

        if (prevFrame) {
            let movementPoints = 0;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

            for (let i = 0; i < currentFrame.data.length; i += 20) { 
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                if (diff > 55) { 
                    movementPoints++;
                    const x = (i / 4) % canvas.width;
                    const y = Math.floor((i / 4) / canvas.width);
                    if (x < minX) minX = x; if (x > maxX) maxX = x;
                    if (y < minY) minY = y; if (y > maxY) maxY = y;
                    trailCtx.fillStyle = "rgba(255, 80, 0, 0.7)";
                    trailCtx.fillRect(x, y, 6, 6);
                }
            }

            if (movementPoints > 80) {
                // Neon Glow Outline
                ctx.strokeStyle = "rgba(255, 0, 0, 0.3)";
                ctx.lineWidth = 14;
                ctx.strokeRect(minX - 12, minY - 12, (maxX - minX) + 24, (maxY - minY) + 24);
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 6;
                ctx.strokeRect(minX - 12, minY - 12, (maxX - minX) + 24, (maxY - minY) + 24);
                
                jitterBuffer.push(movementPoints);
                if (jitterBuffer.length > 20) {
                    const avg = jitterBuffer.reduce((a,b) => a+b) / 20;
                    if (Math.abs(movementPoints - avg) > 2000) triggerAlarm();
                    jitterBuffer.shift();
                }
            }
        }
        prevFrame = currentFrame;
        requestAnimationFrame(analyze);
    }

    function triggerAlarm() {
        if (isAlarming) return;
        isAlarming = true;
        
        // Popup UI Elements
        sidebar.style.display = 'flex';
        alarmOverlay.style.display = 'flex';
        
        if (!audioCtx) audioCtx = new AudioContext();
        siren = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        siren.type = 'sawtooth';
        siren.frequency.setValueAtTime(800, audioCtx.currentTime); 
        siren.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
        gain.gain.value = 0.8;
        siren.connect(gain);
        gain.connect(audioCtx.destination);
        siren.start();
    }

    function resetSystem() {
        isAlarming = false;
        jitterBuffer = [];
        sidebar.style.display = 'none';
        alarmOverlay.style.display = 'none';
        if (siren) { siren.stop(); siren = null; }
        ctx.clearRect(0,0,canvas.width, canvas.height);
        trailCtx.clearRect(0,0,trailCanvas.width, trailCanvas.height);
        requestAnimationFrame(analyze);
    }

    // Start on load
    window.addEventListener('touchstart', () => { if(!audioCtx) audioCtx = new AudioContext(); }, {once: true});
    startCamera();
</script>
</body>
</html>
