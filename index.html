<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan SAMi PRO</title>
    <style>
        :root { --neon: #00f2ea; --bg: #050505; --alert: #ff0000; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .viewport { position: relative; width: 100vw; height: 100vh; background: #000; }
        
        /* Infrared Night Vision Filter */
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(1.4) contrast(2) saturate(0) sepia(1) hue-rotate(320deg) invert(1); 
            opacity: 0.4; 
        }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 10; pointer-events: none; }

        /* UI Elements */
        .ui-header { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--alert); font-weight: bold; }
        .dot { height: 8px; width: 8px; background: var(--alert); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--alert); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .flip-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); border: 1px solid var(--alert); color: white;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px;
        }

        /* Sidebar - ONLY POPS UP ON ALARM */
        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 90px; 
            background: rgba(20, 0, 0, 0.95); border-left: 3px solid var(--alert); 
            display: none; align-items: center; justify-content: center; z-index: 1100;
            box-shadow: -10px 0 30px rgba(255, 0, 0, 0.5);
        }
        .fine-btn { 
            transform: rotate(90deg); background: var(--alert); color: white; padding: 30px 60px; 
            border: none; font-weight: 900; letter-spacing: 5px; border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 40px var(--alert); font-size: 18px; white-space: nowrap;
        }

        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 0, 0.5); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
            animation: pulse 0.2s infinite; pointer-events: none;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="alarm-overlay"></div>

<div class="viewport">
    <div class="ui-header"><span class="dot"></span> SAMi MOTION TRACER ACTIVE</div>
    
    <button class="flip-btn" onclick="flipCamera()">🔄</button>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="sidebar" id="safety-sidebar">
        <button class="fine-btn" onclick="resetSystem()">I'M FINE</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const sidebar = document.getElementById('safety-sidebar');
    const alarmOverlay = document.getElementById('alarm-overlay');
    
    let prevFrame = null;
    let jitterBuffer = [];
    let isAlarming = false;
    let audioCtx = null;
    let siren = null;
    let currentFacingMode = "environment"; 

    async function startCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode } 
            });
            video.srcObject = stream;
            requestAnimationFrame(monitor);
        } catch (err) {
            alert("Please allow camera access for tracking.");
        }
    }

    function flipCamera() {
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        startCamera();
    }

    function monitor() {
        if (isAlarming) return requestAnimationFrame(monitor);

        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        if (prevFrame) {
            let movePoints = 0;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

            // Highly Sensitive Pixel Difference Engine
            for (let i = 0; i < currentFrame.data.length; i += 28) { 
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                if (diff > 40) { // Lower threshold for nighttime sensitivity
                    movePoints++;
                    const x = (i / 4) % canvas.width;
                    const y = Math.floor((i / 4) / canvas.width);
                    if (x < minX) minX = x; if (x > maxX) maxX = x;
                    if (y < minY) minY = y; if (y > maxY) maxY = y;
                }
            }

            // RED OUTLINE logic
            if (movePoints > 60) {
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 10;
                ctx.strokeRect(minX - 15, minY - 15, (maxX - minX) + 30, (maxY - minY) + 30);
                
                // Jitter Detection (25-frame limit)
                jitterBuffer.push(movePoints);
                if (jitterBuffer.length > 25) {
                    const avg = jitterBuffer.reduce((a,b) => a+b) / 25;
                    const currentShake = Math.abs(movePoints - avg);
                    
                    // If shaking exceeds 25-frame speed limit
                    if (currentShake > 1800) triggerAlarm();
                    jitterBuffer.shift();
                }
            } else {
                if (jitterBuffer.length > 0) jitterBuffer.shift();
            }
        }
        prevFrame = currentFrame;
        requestAnimationFrame(monitor);
    }

    function triggerAlarm() {
        if (isAlarming) return;
        isAlarming = true;
        
        // POPS UP ONLY NOW
        sidebar.style.display = 'flex';
        alarmOverlay.style.display = 'flex';
        
        if (!audioCtx) audioCtx = new AudioContext();
        siren = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        siren.type = 'sawtooth';
        siren.frequency.setValueAtTime(880, audioCtx.currentTime); 
        siren.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.value = 0.9;
        siren.connect(gain);
        gain.connect(audioCtx.destination);
        siren.start();
        if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
    }

    function resetSystem() {
        isAlarming = false;
        jitterBuffer = [];
        sidebar.style.display = 'none';
        alarmOverlay.style.display = 'none';
        if (siren) { siren.stop(); siren = null; }
        ctx.clearRect(0,0,canvas.width, canvas.height);
        requestAnimationFrame(monitor);
    }

    // Audio unlock
    window.addEventListener('touchstart', () => { if(!audioCtx) audioCtx = new AudioContext(); }, {once: true});
    startCamera();
</script>
</body>
</html>
