<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vulcan Caddie Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --accent: #7a00ff; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 3D Map Viewport */
        #map-wrap { flex-grow: 1; position: relative; perspective: 1000px; height: 100vh; overflow: hidden; }
        #map { width: 100%; height: 150%; transform: rotateX(45deg); transform-origin: bottom; transition: transform 0.5s; }

        /* Tournament HUD */
        .hud { position: absolute; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.85); padding: 10px; box-sizing: border-box; border-bottom: 2px solid var(--neon); }
        .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .score-box { background: #000; border: 1px solid #444; color: var(--neon); width: 40px; text-align: center; border-radius: 4px; padding: 5px; font-weight: bold; }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .controls { position: absolute; bottom: 20px; left: 15px; right: 15px; z-index: 1000; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="setup" style="position:fixed; inset:0; z-index:2000; background:var(--bg); padding:30px;">
    <h2 style="color:var(--neon)">TOURNAMENT SETUP</h2>
    <div style="background:var(--panel); padding:20px; border-radius:15px;">
        <label style="font-size:12px; color:#aaa;">PLAYER COUNT</label>
        <input type="number" id="p-count" value="4" style="width:100%; padding:12px; background:#000; color:white; border:1px solid #444; margin:10px 0;">
        <button class="btn" style="width:100%" onclick="initTournament()">START ROUND</button>
    </div>
</div>

<div class="hud hidden" id="main-hud">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span id="h-info" style="font-weight:900;">HOLE 1</span>
        <span style="color:var(--neon); font-weight:bold;"><span id="dist">---</span> YDS</span>
    </div>
    <div id="player-list"></div>
</div>

<div id="map-wrap"><div id="map"></div></div>

<div class="controls hidden" id="game-controls">
    <button class="btn" style="flex:1" onclick="scoutHole()">SCOUT HOLE 🚁</button>
    <button class="btn" style="flex:1; background:#000; color:var(--neon); border:1px solid var(--neon);" onclick="nextHole()">NEXT HOLE ➜</button>
</div>

<script>
    let players = [], currentHole = 1, map, userPos, pinPos, pinMarker;

    function initTournament() {
        const count = document.getElementById('p-count').value;
        for(let i=1; i<=count; i++) {
            players.push({ id: i, name: `P${i}`, par: 4, score: 0 });
        }
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main-hud').classList.remove('hidden');
        document.getElementById('game-controls').classList.remove('hidden');
        renderPlayers();
        autoLocateCourse();
    }

    function renderPlayers() {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map(p => `
            <div class="player-row">
                <span style="flex:1; font-size:14px;">${p.name}</span>
                <span style="font-size:10px; color:#666;">PAR</span>
                <input type="number" class="score-box" value="${p.par}" onchange="players[${p.id-1}].par=this.value">
                <span style="font-size:10px; color:#666;">SCORE</span>
                <input type="number" class="score-box" style="color:white" value="${p.score}" onchange="players[${p.id-1}].score=this.value">
            </div>
        `).join('');
    }

    function autoLocateCourse() {
        navigator.geolocation.getCurrentPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            initMap();
        }, () => {
            userPos = [40.0637, -81.5237]; // Default to Byesville
            initMap();
        });
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(userPos, 19);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.circleMarker(userPos, { color: 'var(--neon)', radius: 8, fillOpacity: 1 }).addTo(map);
        placePin();
    }

    function placePin() {
        // Simulating "Dogleg" and "Curve" detection
        const offset = 0.002 + (currentHole * 0.0001);
        pinPos = [userPos[0] + offset, userPos[1] + (currentHole % 2 === 0 ? offset : -offset)];
        
        if (pinMarker) map.removeLayer(pinMarker);
        pinMarker = L.marker(pinPos, { icon: L.divIcon({ html: '🚩', className: 'f' }) }).addTo(map);
        
        const d = Math.round(map.distance(userPos, pinPos) * 1.09361);
        document.getElementById('dist').innerText = d;
    }

    function scoutHole() {
        // "See the curves before you get there"
        map.flyTo(pinPos, 20, { duration: 3 });
        setTimeout(() => map.flyTo(userPos, 19, { duration: 2 }), 4000);
    }

    function nextHole() {
        currentHole++;
        document.getElementById('h-info').innerText = `HOLE ${currentHole}`;
        placePin();
    }
</script>
</body>
</html>
