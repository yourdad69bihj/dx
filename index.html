<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Guard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --alert: #ff0055; --tracking: #ff0000; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .viewport { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 10; }

        /* Status UI */
        .status-ui { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .dot { height: 8px; width: 8px; background: var(--tracking); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--tracking); }

        /* The Interactive Sidebar */
        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 85px; 
            background: rgba(10, 0, 0, 0.9); border-left: 2px solid var(--alert); 
            display: flex; align-items: center; justify-content: center; z-index: 1000; pointer-events: auto;
            box-shadow: -10px 0 20px rgba(0,0,0,0.5);
        }
        .fine-btn { 
            transform: rotate(90deg); background: var(--alert); color: white; padding: 25px 55px; 
            border: none; font-weight: 900; letter-spacing: 4px; border-radius: 6px; cursor: pointer;
            box-shadow: 0 0 30px var(--alert); font-size: 16px; text-transform: uppercase;
        }

        /* Emergency Flash Overlay */
        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 85, 0.85); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
            animation: pulse 0.6s infinite; pointer-events: none;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="alarm-overlay">
    <h1 style="font-size: 45px; text-transform: uppercase; text-shadow: 0 0 20px #000;">Emergency Detetced</h1>
    <p style="letter-spacing: 2px;">HIT SIDEBAR TO RESET</p>
</div>

<div class="viewport">
    <div class="status-ui"><span class="dot"></span> Vulcan Tracking Engine</div>
    
    <video id="video" preload autoplay loop muted playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="sidebar">
        <button class="fine-btn" onclick="resetEmergency()">I'M FINE</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const alarmOverlay = document.getElementById('alarm-overlay');
    
    let isEmergency = false;
    let audioCtx = null;
    let alarmOscillator = null;

    // Movement History Buffer for Jitter Detection
    const TRACKING_HISTORY_LIMIT = 20;
    let objectHistory = {};

    // 1. Activate Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { 
            video.srcObject = stream; 
            // Required for audio playback security
            window.addEventListener('click', () => { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }, {once: true});
        })
        .catch(() => alert("Camera permission required for Object Tracking."));

    // 2. Setup Object Tracking Engine
    // We use ColorTracker as a high-speed motion fallback for "things"
    const tracker = new tracking.ColorTracker(['magenta', 'cyan', 'yellow']);
    
    tracker.on('track', function(event) {
        if (isEmergency) return;
        
        context.clearRect(0, 0, canvas.width, canvas.height);
        
        event.data.forEach(function(rect, index) {
            // Draw Tracking Highlight (Red Box)
            context.strokeStyle = '#ff0000';
            context.lineWidth = 4;
            context.strokeRect(rect.x, rect.y, rect.width, rect.height);
            
            // Analyze Jitter/Seizure Pattern
            analyzeMovement(index, rect);
        });
    });

    // 3. Jitter Analytics Engine
    function analyzeMovement(id, rect) {
        if (!objectHistory[id]) objectHistory[id] = [];
        
        const center = { x: rect.x + rect.width / 2, y: rect.y + rect.height / 2 };
        objectHistory[id].push(center);

        if (objectHistory[id].length > TRACKING_HISTORY_LIMIT) {
            objectHistory[id].shift();

            // Calculate Frequency of direction changes (Jitter)
            let jitterCount = 0;
            for (let i = 2; i < objectHistory[id].length; i++) {
                const p1 = objectHistory[id][i-2];
                const p2 = objectHistory[id][i-1];
                const p3 = objectHistory[id][i];

                const v1 = { x: p2.x - p1.x, y: p2.y - p1.y };
                const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };

                // Dot product shows sudden reversals
                const dotProduct = v1.x * v2.x + v1.y * v2.y;
                if (dotProduct < -50) { // High threshold for sharp, chaotic movement
                    jitterCount++;
                }
            }

            // If object is rapidly changing direction while mostly stationary
            if (jitterCount > 8 && rect.width < (canvas.width * 0.5)) {
                triggerEmergency();
            }
        }
    }

    // Start Tracking
    tracking.track('#video', tracker);

    // 4. Emergency & Sidebar Logic
    function triggerEmergency() {
        if (isEmergency || !audioCtx) return;
        isEmergency = true;
        alarmOverlay.style.display = 'flex';
        
        // Start Loud Alarm
        alarmOscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        alarmOscillator.type = 'sawtooth';
        alarmOscillator.frequency.setValueAtTime(660, audioCtx.currentTime); 
        alarmOscillator.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        alarmOscillator.frequency.setTargetAtTime(660, audioCtx.currentTime + 0.2, 0.1);
        alarmOscillator.loop = true;

        gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
        
        alarmOscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        alarmOscillator.start();
    }

    function resetEmergency() {
        if (!isEmergency) return;
        isEmergency = false;
        objectHistory = {}; // Clear tracking data
        alarmOverlay.style.display = 'none';
        if (alarmOscillator) {
            alarmOscillator.stop();
            alarmOscillator = null;
        }
    }

    // Sync canvas resolution
    window.addEventListener('resize', syncCanvas);
    function syncCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    syncCanvas();
</script>
</body>
</html>
