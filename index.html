<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vulcan Golf: First-Person</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --alert: #ff0055; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 3D Perspective Tilt */
        #map-container { 
            perspective: 1000px; width: 100vw; height: 100vh; display: flex; 
            background: #000; overflow: hidden;
        }
        #map { 
            width: 100%; height: 140%; /* Oversize to handle the tilt */
            transform: rotateX(45deg); 
            transform-origin: bottom;
            filter: saturate(1.3) contrast(1.1) brightness(0.9);
        }

        /* HUD Overlays */
        .hud-top { 
            position: absolute; top: 0; width: 100%; z-index: 1000; padding: 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .dist-card { text-align: center; border: 1px solid var(--neon); padding: 10px 15px; border-radius: 8px; background: rgba(0,0,0,0.5); }
        .val { font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .controls { position: absolute; bottom: 40px; left: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { flex: 1; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); padding: 15px; border-radius: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-active { background: var(--neon); color: #000; }

        .log-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 40px 20px; }
    </style>
</head>
<body>

<div id="setup" style="position:fixed; inset:0; z-index:3000; background:var(--bg); padding:40px 20px;">
    <h2 style="color:var(--neon)">VULCAN 3D GOLF</h2>
    <div style="background:var(--panel); padding:20px; border-radius:12px;">
        <label style="font-size:10px; color:#666;">PLAYER NAMES (COMMA SEPARATED)</label>
        <input type="text" id="names" value="Player 1, Player 2" style="width:100%; background:#000; color:white; border:1px solid #444; padding:12px; margin:10px 0; border-radius:8px;">
        <button class="btn btn-active" style="width:100%" onclick="initRound()">START FIRST-PERSON ROUND</button>
    </div>
</div>

<div class="hud-top">
    <div>
        <span style="font-size:10px; color:#555; display:block;">CURRENT HOLE</span>
        <span style="font-size:24px; font-weight:900;" id="h-num">HOLE 1</span>
    </div>
    <div class="dist-card">
        <span class="val" id="d-val">0</span>
        <span style="font-size:9px; display:block; color:var(--neon);">YDS TO FLAG</span>
    </div>
</div>

<div id="map-container"><div id="map"></div></div>

<div class="controls">
    <button class="btn" onclick="prevHole()">◀</button>
    <button class="btn btn-active" onclick="showScoreModal()">LOG SCORE & NEXT</button>
    <button class="btn" onclick="nextHole()">▶</button>
</div>

<div id="score-modal" class="log-overlay">
    <h2 id="log-title">LOG HOLE 1</h2>
    <div id="player-list"></div>
    <button class="btn btn-active" style="width:100%; margin-top:20px;" onclick="saveAndNext()">CONTINUE ➜</button>
</div>

<script>
    let players = [], currentHole = 1, map, userPos, pinMarker, userMarker, trace;

    function initRound() {
        const names = document.getElementById('names').value.split(',');
        players = names.map(n => ({ name: n.trim(), scores: {} }));
        document.getElementById('setup').style.display = 'none';
        startMap();
    }

    function startMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, { color: '#00f2ea', radius: 8, fillOpacity: 1 }).addTo(map);
                map.setView(userPos, 19); // Deep zoom for 3D feel
            } else { userMarker.setLatLng(userPos); }
            updateTrace();
        }, null, { enableHighAccuracy: true });

        map.on('click', e => {
            if (pinMarker) map.removeLayer(pinMarker);
            pinMarker = L.marker(e.latlng, {
                icon: L.divIcon({ className:'pin', html:'<div style="background:red;width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 0 10px red;"></div>' })
            }).addTo(map);
            updateTrace();
        });
    }

    function updateTrace() {
        if (!userPos || !pinMarker) return;
        const d = Math.round(map.distance(userPos, pinMarker.getLatLng()) * 1.09361);
        document.getElementById('d-val').innerText = d;
        if (trace) map.removeLayer(trace);
        trace = L.polyline([userPos, pinMarker.getLatLng()], { color: 'var(--neon)', weight: 3, dashArray: '10, 15' }).addTo(map);
        
        // Auto-orient map toward flag
        const bounds = L.latLngBounds([userPos, pinMarker.getLatLng()]);
        map.fitBounds(bounds, { padding: [100, 100] });
    }

    function showScoreModal() {
        document.getElementById('log-title').innerText = `LOG HOLE ${currentHole}`;
        const list = document.getElementById('player-list');
        list.innerHTML = players.map((p, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #222; padding:10px;">
                <span>${p.name}</span>
                <input type="number" class="p-score" data-idx="${i}" value="4" style="width:60px; background:#000; border:1px solid var(--neon); color:white; text-align:center; padding:5px;">
            </div>
        `).join('');
        document.getElementById('score-modal').style.display = 'block';
    }

    function saveAndNext() {
        const inputs = document.querySelectorAll('.p-score');
        inputs.forEach(input => {
            const idx = input.getAttribute('data-idx');
            players[idx].scores[currentHole] = parseInt(input.value);
        });
        document.getElementById('score-modal').style.display = 'none';
        if (currentHole === 18) { alert("ROUND COMPLETE!"); location.reload(); }
        else { nextHole(); }
    }

    function nextHole() {
        currentHole = Math.min(18, currentHole + 1);
        document.getElementById('h-num').innerText = `HOLE ${currentHole}`;
        if (pinMarker) { map.removeLayer(pinMarker); map.removeLayer(trace); }
    }

    function prevHole() {
        currentHole = Math.max(1, currentHole - 1);
        document.getElementById('h-num').innerText = `HOLE ${currentHole}`;
    }
</script>
</body>
</html>
