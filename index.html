<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Guard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --alert: #ff0055; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        .cam-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        /* Emergency Sidebar */
        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 70px; 
            background: rgba(255, 0, 85, 0.2); border-left: 2px solid var(--alert); 
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .fine-btn { 
            transform: rotate(90deg); white-space: nowrap; background: var(--alert); 
            color: white; padding: 20px 40px; border: none; font-weight: 900; 
            letter-spacing: 2px; border-radius: 5px; cursor: pointer;
            box-shadow: 0 0 20px var(--alert);
        }

        /* Status Overlay */
        .status { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .dot { height: 8px; width: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--neon); }

        /* Alarm Screen */
        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 85, 0.8); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
        }
    </style>
</head>
<body>

<div id="alarm-overlay">
    <h1 style="font-size: 50px; text-align: center;">EMERGENCY DETECTED</h1>
    <p>TAP SIDEBAR TO DEACTIVATE</p>
</div>

<div class="cam-container">
    <div class="status"><span class="dot"></span> Vulcan Guard Active</div>
    
    <video id="video" preload autoplay loop muted></video>
    <canvas id="canvas"></canvas>

    <div class="sidebar">
        <button class="fine-btn" onclick="deactivateAlarm()">I'M FINE</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const alarmOverlay = document.getElementById('alarm-overlay');
    
    let alarmActive = false;
    let jitterScore = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let alarmOscillator;

    // 1. Setup Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera Access Required"));

    // 2. Highlighting Logic (Color Tracking)
    const tracker = new tracking.ColorTracker(['magenta', 'cyan', 'yellow']);
    tracker.on('track', function(event) {
        context.clearRect(0, 0, canvas.width, canvas.height);
        event.data.forEach(function(rect) {
            context.strokeStyle = '#00f2ea';
            context.lineWidth = 2;
            context.strokeRect(rect.x, rect.y, rect.width, rect.height);
            context.fillStyle = "rgba(0, 242, 234, 0.1)";
            context.fillRect(rect.x, rect.y, rect.width, rect.height);
        });
    });
    tracking.track('#video', tracker);

    // 3. Motion/Jitter Detection
    window.addEventListener('devicemotion', (event) => {
        if (alarmActive) return;

        const acc = event.accelerationIncludingGravity;
        const totalMotion = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);

        // Detect high-intensity shaking (Seizure/Jitter threshold)
        if (totalMotion > 35) { 
            jitterScore++;
        } else {
            jitterScore = Math.max(0, jitterScore - 0.5);
        }

        if (jitterScore > 20) {
            triggerAlarm();
        }
    });

    function triggerAlarm() {
        alarmActive = true;
        alarmOverlay.style.display = 'flex';
        
        // Start Loud Sound
        alarmOscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        alarmOscillator.type = 'square';
        alarmOscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
        
        alarmOscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        alarmOscillator.start();
    }

    function deactivateAlarm() {
        alarmActive = false;
        jitterScore = 0;
        alarmOverlay.style.display = 'none';
        if (alarmOscillator) {
            alarmOscillator.stop();
        }
    }

    // Adjust canvas size
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

</script>
</body>
</html>
