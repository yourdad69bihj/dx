<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Guard: IR Tracer PRO</title>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --alert: #ff0055; --ir-heat: #ff3c00; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Infrared Filter */
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(1.1) contrast(1.8) saturate(0) sepia(1) hue-rotate(320deg) invert(1); 
            opacity: 0.35; 
        }
        
        /* Viewport Layers */
        .viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 10; }
        #trailCanvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; opacity: 0.7; }

        /* UI Overlays */
        .ui-header { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--ir-heat); font-weight: bold; }
        .dot { height: 8px; width: 8px; background: var(--ir-heat); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--ir-heat); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .sidebar { 
            position: absolute; right: 0; top: 0; height: 100%; width: 85px; 
            background: rgba(20, 0, 0, 0.9); border-left: 2px solid var(--alert); 
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .fine-btn { 
            transform: rotate(90deg); background: var(--alert); color: white; padding: 25px 55px; 
            border: none; font-weight: 900; letter-spacing: 4px; border-radius: 6px; cursor: pointer;
            box-shadow: 0 0 30px var(--alert); font-size: 16px;
        }

        #alarm-overlay { 
            position: fixed; inset: 0; background: rgba(255, 0, 0, 0.85); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; 
            animation: pulse 0.3s infinite; pointer-events: none;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="alarm-overlay">
    <h1 style="font-size: 40px; text-align: center; font-weight: 900; text-transform: uppercase;">Critical Jitter Detected</h1>
    <p style="letter-spacing: 2px;">MANUAL RESET REQUIRED</p>
</div>

<div class="viewport">
    <div class="ui-header"><span class="dot"></span> IR MOTION TRACER ACTIVE</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="trailCanvas"></canvas>
    <canvas id="canvas"></canvas>
    <div class="sidebar">
        <button class="fine-btn" onclick="resetSystem()">I'M FINE</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // Trail Engine
    const trailCanvas = document.getElementById('trailCanvas');
    const trailCtx = trailCanvas.getContext('2d');
    
    const alarmOverlay = document.getElementById('alarm-overlay');
    
    let prevFrame = null;
    let jitterBuffer = [];
    let isAlarming = false;
    let audioCtx = null;
    let siren = null;

    // 1. Initialize IR Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { 
            video.srcObject = stream; 
            requestAnimationFrame(analyze);
            // Audio unlock on first touch
            window.addEventListener('touchstart', () => { if(!audioCtx) audioCtx = new AudioContext(); }, {once: true});
        });

    function analyze() {
        if (isAlarming) return requestAnimationFrame(analyze);

        // Sync canvas sizes
        if (canvas.width !== video.videoWidth) {
            canvas.width = trailCanvas.width = video.videoWidth;
            canvas.height = trailCanvas.height = video.videoHeight;
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // Add fading to the trail
        trailCtx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
        trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);

        if (prevFrame) {
            let movementPoints = 0;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

            // 2. IR Motion & Heat Trail Engine
            for (let i = 0; i < currentFrame.data.length; i += 16) { 
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                
                if (diff > 50) { 
                    movementPoints++;
                    const x = (i / 4) % canvas.width;
                    const y = Math.floor((i / 4) / canvas.width);

                    // Update Outline Bounds
                    if (x < minX) minX = x; if (x > maxX) maxX = x;
                    if (y < minY) minY = y; if (y > maxY) maxY = y;

                    // Draw Fading Heat Trail
                    trailCtx.fillStyle = "rgba(255, 100, 0, 0.6)";
                    trailCtx.fillRect(x, y, 5, 5);
                }
            }

            // 3. Draw Thick Neon Outline
            if (movementPoints > 100) {
                // Outer Glow
                ctx.strokeStyle = "rgba(255, 0, 0, 0.3)";
                ctx.lineWidth = 12;
                ctx.strokeRect(minX - 10, minY - 10, (maxX - minX) + 20, (maxY - minY) + 20);
                
                // Inner Neon Line
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 6;
                ctx.strokeRect(minX - 10, minY - 10, (maxX - minX) + 20, (maxY - minY) + 20);
                
                // Track "Jitter" Intensity over 20 frames
                jitterBuffer.push(movementPoints);
                if (jitterBuffer.length > 20) {
                    const avg = jitterBuffer.reduce((a,b) => a+b) / 20;
                    const currentJitter = Math.abs(movementPoints - avg);
                    
                    if (currentJitter > 1800) { // Slightly adjusted sensitivity
                        triggerAlarm();
                    }
                    jitterBuffer.shift();
                }
            }
        }

        prevFrame = currentFrame;
        requestAnimationFrame(analyze);
    }

    function triggerAlarm() {
        if (isAlarming || !audioCtx) return;
        isEmergency = true;
        alarmOverlay.style.display = 'flex';
        
        // 4. High-Intensity Siren
        siren = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        siren.type = 'sawtooth';
        siren.frequency.setValueAtTime(900, audioCtx.currentTime); 
        siren.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.1);
        
        gain.gain.value = 1.0;
        siren.connect(gain);
        gain.connect(audioCtx.destination);
        siren.start();
    }

    function resetSystem() {
        isAlarming = false;
        jitterBuffer = [];
        alarmOverlay.style.display = 'none';
        if (siren) {
            siren.stop();
            siren = null;
        }
        // Clear trail and outline
        ctx.clearRect(0,0,canvas.width, canvas.height);
        trailCtx.clearRect(0,0,trailCanvas.width, trailCanvas.height);
        requestAnimationFrame(analyze);
    }
</script>
</body>
</html>
